name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    types:
      - opened
      - synchronize
      - reopened

jobs:

  build:
    runs-on: ubuntu-latest
    environment: env_test01
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.23

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
    
    - name: echo
      run: echo ${{vars.VAR_TEST01}}
